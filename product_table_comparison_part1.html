<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Table Loader</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    height: 100vh;

    /* Purple to light grey gradient */
    background: linear-gradient(to bottom right, #6a0dad, #d3d3d3);

    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Main container (landscape rectangle) */
  .container {
    width: 80%;
    max-width: 900px;
    background: white;
    padding: 30px;
    border-radius: 15px;
    text-align: center;

    /* Shadow */
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }

  h1 {
    margin-bottom: 20px;
  }

  /* Buttons */
  button {
    margin: 10px;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;

    background-color: #6a0dad;
    color: white;
    font-weight: bold;

    transition: 0.3s;

    /* Shadow */
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
  }

  /* Hover effect */
  button:hover {
    background-color: #8a2be2; /* lighter purple */
  }

  table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 20px;
  }

  th, td {
    border: 1px solid #333;
    padding: 10px;
  }

  th {
    background: #eee;
  }

  #message {
    margin-top: 15px;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Product Table Loader</h1>

  <button onclick="loadWithInnerHTML()">Load using innerHTML</button>
  <button onclick="loadWithDOM()">Load using DOM methods</button>
  <button onclick="clearTable()">Clear Table</button>

  <div id="message"></div>
  <div id="tableContainer"></div>
</div>

<script>
const products = [
  { name: "Laptop", price: "$800", category: "Electronics" },
  { name: "Shoes", price: "$50", category: "Fashion" },
  { name: "Watch", price: "$120", category: "Accessories" },
  { name: "Phone", price: "$600", category: "Electronics" },
  { name: "Backpack", price: "$40", category: "Bags" }
];

// INNER HTML METHOD
function loadWithInnerHTML() {
  let html = "<table>";
  html += "<tr><th>Product Name</th><th>Price</th><th>Category</th></tr>";

  products.forEach(product => {
    html += `<tr>
      <td>${product.name}</td>
      <td>${product.price}</td>
      <td>${product.category}</td>
    </tr>`;
  });

  html += "</table>";

  document.getElementById("tableContainer").innerHTML = html;
  document.getElementById("message").textContent = "Method used: innerHTML";
}

// DOM METHOD
function loadWithDOM() {
  const container = document.getElementById("tableContainer");
  container.innerHTML = "";

  const table = document.createElement("table");

  const headerRow = document.createElement("tr");
  ["Product Name", "Price", "Category"].forEach(text => {
    const th = document.createElement("th");
    th.textContent = text;
    headerRow.appendChild(th);
  });
  table.appendChild(headerRow);

  products.forEach(product => {
    const row = document.createElement("tr");

    const name = document.createElement("td");
    name.textContent = product.name;

    const price = document.createElement("td");
    price.textContent = product.price;

    const category = document.createElement("td");
    category.textContent = product.category;

    row.appendChild(name);
    row.appendChild(price);
    row.appendChild(category);

    table.appendChild(row);
  });

  container.appendChild(table);
  document.getElementById("message").textContent = "Method used: DOM methods";
}

// CLEAR TABLE
function clearTable() {
  document.getElementById("tableContainer").innerHTML = "";
  document.getElementById("message").textContent = "Table cleared";
}
</script>

</body>
</html>
